name: 'Kaggle Kernel Push'
author: 'Simplified version based on productdeployer/kaggle-action'
description: 'Push a notebook/script to Kaggle as a kernel (supports GPU/internet).'

inputs:
  username:
    description: 'Kaggle username'
    required: true
  key:
    description: 'Kaggle API key'
    required: true
  title:
    description: 'Kernel title (use kebab-case, no spaces)'
    required: true
  code_file:
    description: 'Path to .ipynb or .py file (relative to repo root)'
    required: true
  language:
    description: 'Language'
    default: 'python'
  kernel_type:
    description: 'notebook or script'
    default: 'notebook'
  enable_gpu:
    description: 'enable or disable'
    default: 'enable'
  enable_internet:
    description: 'enable or disable'
    default: 'enable'

runs:
  using: composite
  steps:
    - name: Install Kaggle CLI
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade kaggle

    - name: Configure Kaggle credentials
      shell: bash
      env:
        # Optional fallback (only if needed — usually not, only kaggle cli version < 1.8.0)
        KAGGLE_USERNAME: ${{ inputs.username }}
        KAGGLE_KEY:      ${{ inputs.key }}
      run: |
        mkdir -p ~/.kaggle
        echo "{\"username\":\"$KAGGLE_USERNAME\",\"key\":\"$KAGGLE_KEY\"}" > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json

    - name: Push kernel to Kaggle
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        WORKSPACE:   ${{ github.workspace }}
        KAGGLE_API_TOKEN: ${{ inputs.key }}
      run: |
        cd "$ACTION_PATH"

        # Create fresh metadata
        kaggle kernels init -p .

        # Patch kernel-metadata.json
        # Patch with correct values (use booleans without quotes)
        sed -i 's|"title":.*|"title": "${{ inputs.title }}",|' kernel-metadata.json
        sed -i 's|"code_file":.*|"code_file": "'"$WORKSPACE"'/${{ inputs.code_file }}",|' kernel-metadata.json
        sed -i 's|"language":.*|"language": "${{ inputs.language }}",|' kernel-metadata.json
        sed -i 's|"kernel_type":.*|"kernel_type": "${{ inputs.kernel_type }}",|' kernel-metadata.json

        # GPU: write real boolean
        GPU_BOOL=$([[ "${{ inputs.enable_gpu }}" == "enable" ]] && echo true || echo false)
        sed -i "s|\"enable_gpu\":.*|\"enable_gpu\": $GPU_BOOL,|" kernel-metadata.json
        # or if the template has "enable_gpu": false already:
        # sed -i "s|\"enable_gpu\":.*|\"enable_gpu\": $GPU_BOOL,|" kernel-metadata.json

        # TPU: usually keep false unless you specifically need it
        TPU_BOOL=$([[ "${{ inputs.enable_tpu }}" == "enable" ]] && echo true || echo false)
        sed -i "s|\"enable_tpu\":.*|\"enable_tpu\": $TPU_BOOL,|" kernel-metadata.json

        # Internet: boolean
        INTERNET_BOOL=$([[ "${{ inputs.enable_internet }}" == "enable" ]] && echo true || echo false)
        sed -i "s|\"enable_internet\":.*|\"enable_internet\": $INTERNET_BOOL,|" kernel-metadata.json

        # Optional: force id/slug
        sed -i 's|"id":.*|"id": "${{ inputs.username }}/${{ inputs.title }}",|' kernel-metadata.json

        # Show what we will push (debug)
        cat kernel-metadata.json

        # Push!
        # kaggle kernels push
        kaggle kernels push --accelerator NvidiaTeslaT4

        echo "Kernel pushed → check https://www.kaggle.com/code/${{ inputs.username }}/${{ inputs.title }}"